<div class="container py-4">
  <div class="card shadow-sm">
    <div class="card-body">
      <h5 class="card-title mb-4">Company Details</h5>

      <form [formGroup]="companyForm" (ngSubmit)="saveCompanyDetails()">

        <div class="row g-3">


            <div class="col-md-12 text-center">
            <label>Logo</label>
            <input type="file" class="form-control" (change)="onFileSelected($event)">
            <div class="mb-2 mt-2">
              <img *ngIf="logoPreview" [src]="logoPreview" class="img-fluid rounded" style="max-height:120px;">
            </div>
          </div>

          <div class="col-md-4">
            <label>ID</label>
            <input type="text" class="form-control" formControlName="id" readonly>
          </div>

          <div class="col-md-8">
            <label>Company Name</label>
            <input type="text" class="form-control" formControlName="companyName">
          </div>

          

          <div class="col-12">
            <label>Address</label>
            <input type="text" class="form-control" formControlName="address">
          </div>

          <div class="col-md-4">
            <label>Phone 1</label>
            <input type="text" class="form-control" formControlName="phone1">
          </div>

          <div class="col-md-4">
            <label>Phone 2</label>
            <input type="text" class="form-control" formControlName="phone2">
          </div>

          <div class="col-md-4">
            <label>Email</label>
            <input type="email" class="form-control" formControlName="email">
          </div>

          <div class="col-md-4">
            <label>Complain No 1</label>
            <input type="text" class="form-control" formControlName="complain_no1">
          </div>

          <div class="col-md-4">
            <label>Complain No 2</label>
            <input type="text" class="form-control" formControlName="complain_no2">
          </div>

          <div class="col-12">
            <label>Description / Complain Numbers</label>
            <textarea rows="5" class="form-control" formControlName="description"></textarea>
          </div>

        </div>

        <div class="text-center mt-4">
          <button class="btn btn-primary px-5" type="submit" [disabled]="isLoading">
            {{ isLoading ? 'Saving...' : 'Submit' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
